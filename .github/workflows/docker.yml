name: Build and Push Docker Image

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.compare.outputs.new-version }}
      version-changed: ${{ steps.compare.outputs.version-changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: current-version
        run: |
          VERSION=$(jq -r '.version' frontend/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - id: latest-tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - id: compare
        run: |
          CURRENT="${{ steps.current-version.outputs.version }}"
          LATEST="${{ steps.latest-tag.outputs.tag }}"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "version-changed=false" >> $GITHUB_OUTPUT
          else
            echo "version-changed=true" >> $GITHUB_OUTPUT
          fi
          echo "new-version=$CURRENT" >> $GITHUB_OUTPUT

  build-web:
    needs: get-version
    if: needs.get-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          provenance: false
          sbom: false
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-web:
    needs: [get-version, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Publish Docker image
        uses: docker/build-push-action@v6
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          provenance: false
          sbom: false
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/elpitagoras14/open-shelf-web:${{ needs.get-version.outputs.new-version }}
            ghcr.io/elpitagoras14/open-shelf-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [get-version, publish-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.get-version.outputs.new-version }}

      - name: Push Tag
        run: git push origin ${{ needs.get-version.outputs.new-version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.new-version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [get-version, release]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dokploy
        id: dokploy
        continue-on-error: true
        run: |
          curl -X 'POST' \
            'https://dokploy.elpitagoras14.qzz.io/api/compose.deploy' \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'x-api-key: ${{ secrets.DOKPLOY_API_KEY }}' \
            -d '{
              "composeId": "${{ vars.DOKPLOY_COMPOSE_ID }}",
              "title": "Deployment v${{ needs.get-version.outputs.new-version }}",
              "description": "Automatic deployment from GitHub Actions"
            }'

      - name: Deploy to Dokploy status check
        if: always()
        run: echo "Dokploy deployment completed"
